title: "【破冰测试】"
body:
  - type: markdown
    attributes:
      value: |
        这是一个临时诊断表单，仅用于验证 GitHub Discussion 类别表单是否正常加载。请勿在此发布个人信息或敏感信息。
  - type: input
    id: nickname
    attributes:
      label: 怎么称呼你？
      placeholder: 例如：小明 / Ming
    validations:
      required: true
  - type: textarea
    id: direction
    attributes:
      label: 我感兴趣的项目方向
      placeholder: 例如：校园工具、数据可视化、AI 应用……
    validations:
      required: true
  - type: checkboxes
    id: roles
    attributes:
      label: 我能负责或愿意尝试的角色
      options:
        - label: 💻 Coding
        - label: 🧭 Support
        - label: 🎨 设计
        - label: 📊 数据
        - label: 🤝 沟通协调
        - label: 🌟 鼓励师
        - label: 🔧 资源协调与环境支持
        - label: 其他
  - type: textarea
    id: skills
    attributes:
      label: 我会的技能 / 想学的技能（可选）
  - type: input
    id: mbti
    attributes:
      label: MBTI（可选）
      placeholder: 例如：INTP
  - type: input
    id: pronouns
    attributes:
      label: 希望别人如何称呼你／代词（可选）
      placeholder: 例如：he/him、she/her、they/them、TA，或自行填写
  - type: input
    id: availability
    attributes:
      label: 我预计可以投入的时间（可选）
      placeholder: 例如：每天 1–2 小时
  - type: markdown
    attributes:
      value: "## ✨ 我的 Vibe 工具栈"
  - type: textarea
    id: vibe_tools
    attributes:
      label: 我常用的 Vibe 工具（可选）
      placeholder: 例如：Claude Code、Codex、Cursor、VS Code、Trae、Kiro、Gemini CLI
  - type: textarea
    id: models
    attributes:
      label: 我用过或想尝试的模型（可选）
      placeholder: 例如：GPT、GLM、Claude、Gemini、Qwen、DeepSeek
  - type: textarea
    id: agent_skills
    attributes:
      label: 我常用或想学习的 Skills（可选）
      placeholder: 例如：规划、前端设计、数据分析、文档、测试、GitHub 协作
  - type: textarea
    id: mcp
    attributes:
      label: 我用过或想探索的 MCP（可选）
      description: 只写用途，不要提供配置细节或密钥。
      placeholder: 例如：网页检索、GitHub、数据库、浏览器自动化、设计工具
  - type: markdown
    attributes:
      value: "## 🚀 我正在做的东西"
  - type: textarea
    id: project
    attributes:
      label: 我的 Vibe 项目 / 想做的项目（可选）
      placeholder: 一句话介绍即可
  - type: input
    id: project_link
    attributes:
      label: 项目链接（可选）
      description: 仅添加愿意公开分享的仓库、Demo 或作品集。
  - type: textarea
    id: teammates
    attributes:
      label: 希望找什么样的伙伴（可选）
