title: "【Skill】"
labels: []
body:
  - type: markdown
    attributes:
      value: |
        欢迎分享你喜欢的 AI Agent Skill（如 Cursor / Claude Code 的 `SKILL.md` 与可复用工作流）！

        请先搜索是否已有相似推荐；完整 Skill 文件优先用公开仓库或 gist 外链。请勿发布 Token、密码、私有端点、学号、电话或其他敏感信息。
  - type: input
    id: skill_name
    attributes:
      label: Skill 名称
      placeholder: 例如：前端设计审查 / PR 描述助手
    validations:
      required: true
  - type: input
    id: one_liner
    attributes:
      label: 一句话价值
      description: 用一句话说明它解决什么问题。
      placeholder: 例如：帮我把散乱需求整理成可执行的实现计划
    validations:
      required: true
  - type: dropdown
    id: tools
    attributes:
      label: 适用工具
      description: 选择最主要的一项；多种工具可在正文补充。
      options:
        - Cursor
        - Claude Code
        - Codex / 其他 CLI Agent
        - 通用（多工具可用）
        - 其他
    validations:
      required: true
  - type: checkboxes
    id: scenarios
    attributes:
      label: 场景标签
      options:
        - label: 规划
        - label: 前端
        - label: 数据
        - label: 文档
        - label: 测试
        - label: Git / 协作
        - label: 其他
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: 为什么推荐？真实使用感受
      description: 请写你实际用过的场景与效果，避免纯链接搬运。
      placeholder: |
        1. 我在什么任务里用到了它……
        2. 它比不用 Skill 时好在哪里……
        3. 有什么局限或坑……
    validations:
      required: true
  - type: textarea
    id: how_to_get
    attributes:
      label: 获取方式
      description: 公开仓库、gist，或正文内嵌精简摘要。完整文件优先外链。
      placeholder: |
        - 链接：https://……
        - 或粘贴精简 SKILL.md 摘要（已脱敏）
    validations:
      required: true
  - type: textarea
    id: install_steps
    attributes:
      label: 安装 / 使用步骤
      description: 写出 3–5 步，方便同学直接跟做。
      placeholder: |
        1. ……
        2. ……
        3. ……
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: 示例输入 / 输出（可选）
      description: 可附脱敏后的简短示例。
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: 注意事项（可选）
      description: 许可来源、适用边界、已知问题等。
      placeholder: 例如：改编自某某开源 Skill；仅适用于 Cursor Agent；请勿提交含密钥的配置。
    validations:
      required: false
